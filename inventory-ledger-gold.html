<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
  :root{
    --bg: #F6F1E6;
    --bg-raised: #FBF8F0;
    --bg-raised-2: #F1EADA;
    --line: #DDD2B8;
    --line-soft: #E7DEC9;
    --ink: #2B2417;
    --ink-dim: #7A6F58;
    --ink-faint: #ADA083;
    --paper: #FFFDF8;
    --gold: #9C7A2E;
    --gold-dim: #C9AD6B;
    --gold-deep: #6B5424;
    --oxblood: #7A2E2E;
    --oxblood-dim: #C99A9A;
    --good: #4B6B45;
    --serif: 'Cormorant', Georgia, 'Times New Roman', serif;
    --grotesk: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }
  html, body { background: var(--bg); }
  body{
    font-family: var(--grotesk);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  a { color: inherit; }

  /* subtle warm paper-grain ambient backdrop */
  body::before{
    content:"";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 900px 500px at 12% -8%, rgba(156,122,46,0.10), transparent 60%),
      radial-gradient(ellipse 700px 600px at 108% 6%, rgba(122,46,46,0.05), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app{ position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 28px 80px; }

  /* ---------- HEADER ---------- */
  header.top{
    display:flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 40px 0 28px;
    border-bottom: 2px solid var(--gold-dim);
    margin-bottom: 32px;
    gap: 24px;
    flex-wrap: wrap;
  }
  .brand{ display:flex; align-items:center; gap: 16px; }
  .brand svg{ width: 38px; height: 38px; flex-shrink:0; }
  .brand-text .eyebrow{
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .brand-text h1{
    font-family: var(--serif);
    font-weight: 600;
    font-size: 30px;
    letter-spacing: 0.01em;
    color: var(--ink);
  }
  .top-meta{
    text-align: right;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-faint);
    line-height: 1.7;
  }
  .top-meta b{ color: var(--ink-dim); font-weight: 500;}
  .upload-row{ display:flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }
  .btn-upload, .btn-reset-data{
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.04em;
    padding: 7px 12px;
    border-radius: 2px;
    cursor: pointer;
    border: 1px solid var(--gold-dim);
    background: transparent;
    color: var(--gold-deep);
    transition: background .12s, color .12s;
  }
  .btn-upload:hover{ background: rgba(156,122,46,0.10); }
  .btn-reset-data{
    border-color: var(--line);
    color: var(--ink-faint);
  }
  .btn-reset-data:hover{ color: var(--ink-dim); border-color: var(--ink-faint); }
  .btn-reset-data.hidden{ display:none; }
  .upload-status{
    margin-top: 6px;
    font-family: var(--mono);
    font-size: 10.5px;
    min-height: 14px;
    text-align: right;
  }
  .upload-status.ok{ color: var(--good); }
  .upload-status.err{ color: var(--oxblood); }
  .upload-status.busy{ color: var(--gold-deep); }

  /* ---------- MODALS ---------- */
  .modal-overlay{
    position: fixed;
    inset: 0;
    background: rgba(43,36,23,0.45);
    backdrop-filter: blur(2px);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index: 1000;
    padding: 20px;
  }
  .modal-overlay.hidden{ display:none; }
  .modal-box{
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 28px;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(43,36,23,0.18);
  }
  .modal-box-wide{ max-width: 720px; }
  .modal-title{
    font-family: var(--serif);
    font-weight: 600;
    font-size: 21px;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .modal-sub{
    font-size: 12.5px;
    color: var(--ink-dim);
    line-height: 1.5;
    margin-bottom: 18px;
  }
  .modal-input{
    width: 100%;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 11px 12px;
    border-radius: 3px;
    font-size: 14px;
    font-family: var(--grotesk);
    outline: none;
  }
  .modal-input:focus{ border-color: var(--gold); box-shadow: 0 0 0 1px rgba(156,122,46,0.25); }
  .modal-err{
    min-height: 18px;
    color: var(--oxblood);
    font-family: var(--mono);
    font-size: 11.5px;
    margin-top: 8px;
  }
  .modal-actions{
    display:flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
  }
  .btn-modal-cancel, .btn-modal-confirm{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.04em;
    padding: 10px 16px;
    border-radius: 3px;
    cursor: pointer;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink-dim);
  }
  .btn-modal-cancel:hover{ color: var(--ink); border-color: var(--ink-faint); }
  .btn-modal-confirm{
    border-color: var(--gold);
    color: var(--gold-deep);
    font-weight: 600;
  }
  .btn-modal-confirm:hover{ background: rgba(156,122,46,0.10); }
  .btn-modal-confirm.danger{ border-color: var(--oxblood); color: var(--oxblood); }
  .btn-modal-confirm.danger:hover{ background: rgba(122,46,46,0.08); }

  .preview-summary{
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--ink-dim);
    margin-bottom: 12px;
    line-height: 1.6;
  }
  .preview-summary b{ color: var(--ink); font-weight: 600; }
  .preview-warnings{ margin-bottom: 12px; }
  .preview-warning-item{
    font-family: var(--mono);
    font-size: 12px;
    color: var(--gold-deep);
    border: 1px solid var(--gold-dim);
    border-radius: 3px;
    padding: 9px 12px;
    margin-bottom: 6px;
    background: rgba(156,122,46,0.06);
  }
  .preview-warning-item.severe{
    color: var(--oxblood);
    border-color: var(--oxblood-dim);
    background: rgba(122,46,46,0.06);
  }
  .preview-table-wrap{
    max-height: 280px;
    overflow-y: auto;
    border: 1px solid var(--line);
    border-radius: 3px;
  }
  .preview-table{ width:100%; border-collapse: collapse; font-size: 12px; }
  .preview-table thead th{
    background: var(--bg-raised-2);
    text-align:left;
    padding: 7px 8px;
    font-family: var(--mono);
    font-size: 9.5px;
    text-transform: uppercase;
    color: var(--ink-faint);
    border-bottom: 1px solid var(--line);
    white-space: nowrap;
    position: sticky;
    top: 0;
  }
  .preview-table tbody td{
    padding: 6px 8px;
    border-bottom: 1px solid var(--line-soft);
    white-space: nowrap;
    color: var(--ink-dim);
  }
  .preview-table tbody tr:last-child td{ border-bottom: none; }
  .preview-more-row td{
    text-align:center;
    color: var(--ink-faint);
    font-style: italic;
  }
  @media (max-width: 600px){
    .modal-box{ padding: 20px; }
    .preview-table-wrap{ max-height: 220px; }
  }

  /* ---------- SUMMARY STRIP (appraisal card) ---------- */
  .summary{
    display:grid;
    grid-template-columns: 1.3fr 1fr 1fr 1.4fr;
    gap: 1px;
    background: var(--gold-dim);
    border: 1px solid var(--gold-dim);
    margin-bottom: 36px;
  }
  .sum-cell{
    background: var(--paper);
    padding: 22px 24px;
    position: relative;
  }
  .sum-label{
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 10px;
  }
  .sum-value{
    font-family: var(--serif);
    font-size: 34px;
    color: var(--ink);
    font-weight: 600;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .sum-value small{ font-size: 16px; color: var(--ink-dim); font-family: var(--grotesk); margin-left: 6px;}
  .sum-sub{ margin-top: 8px; font-size: 12px; color: var(--ink-dim); }
  .mix-bar{ display:flex; height: 6px; border-radius: 2px; overflow:hidden; margin-top: 14px; }
  .mix-bar span{ height:100%; }
  .mix-legend{ display:flex; flex-wrap:wrap; gap: 10px 16px; margin-top: 10px; font-size: 11px; color: var(--ink-dim);}
  .mix-legend i{ width:7px; height:7px; display:inline-block; border-radius:1px; margin-right:5px; position:relative; top:-1px;}

  /* ---------- LEDGER TABS (signature element) ---------- */
  /* Echoes the physical index-tab dividers of a jeweler's stock ledger;
     each Excel sheet (a carat band, or fancy shapes) becomes a tab. */
  .ledger-tabs{
    display:flex;
    align-items: flex-end;
    gap: 0;
    margin-bottom: -1px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .ledger-tabs::-webkit-scrollbar{ display:none; }
  .ledger-tab{
    font-family: var(--serif);
    font-weight: 600;
    font-size: 14px;
    color: var(--ink-faint);
    background: var(--bg-raised-2);
    border: 1px solid var(--line);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    padding: 10px 18px 9px;
    cursor: pointer;
    white-space: nowrap;
    position: relative;
    top: 1px;
    transition: color .12s, background .12s;
  }
  .ledger-tab:hover{ color: var(--gold-deep); }
  .ledger-tab.active{
    color: var(--gold-deep);
    background: var(--paper);
    border-color: var(--gold-dim);
    box-shadow: 0 -2px 0 var(--gold) inset;
  }
  .ledger-tab .tab-count{
    font-family: var(--mono);
    font-weight: 400;
    font-size: 10px;
    color: var(--ink-faint);
    margin-left: 6px;
  }
  .ledger-tab.active .tab-count{ color: var(--gold); }
  .ledger-page{
    border: 1px solid var(--gold-dim);
    border-radius: 0 4px 4px 4px;
    background: var(--paper);
    padding: 18px 20px 4px;
    margin-bottom: 18px;
  }

  /* ---------- CONTROLS ---------- */
  .controls{
    display:flex;
    gap: 14px;
    align-items: flex-end;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field label{
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .field select, .field input{
    background: var(--bg-raised);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 9px 12px;
    font-family: var(--grotesk);
    font-size: 13px;
    border-radius: 3px;
    outline: none;
    min-width: 110px;
  }
  .field select:focus, .field input:focus{
    border-color: var(--gold);
    box-shadow: 0 0 0 1px rgba(156,122,46,0.22);
  }
  .field.search{ flex: 1; min-width: 200px; }
  .field.search input{ width: 100%; }
  .field select{ cursor:pointer; }

  /* ---------- MULTI-SELECT DROPDOWN ---------- */
  .msel{ position: relative; }
  .msel-btn{
    background: var(--bg-raised);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 9px 10px;
    font-family: var(--grotesk);
    font-size: 13px;
    border-radius: 3px;
    outline: none;
    min-width: 110px;
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 8px;
    cursor: pointer;
    white-space: nowrap;
  }
  .msel-btn:hover{ border-color: var(--ink-faint); }
  .msel.open .msel-btn{ border-color: var(--gold); box-shadow: 0 0 0 1px rgba(156,122,46,0.22); }
  .msel-btn .msel-label{
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--ink-dim);
  }
  .msel-btn .msel-label.has-value{ color: var(--ink); }
  .msel-btn .msel-count{
    font-family: var(--mono);
    font-size: 9.5px;
    color: var(--paper);
    background: var(--gold);
    border-radius: 8px;
    padding: 1px 6px;
    flex-shrink: 0;
  }
  .msel-btn .msel-caret{
    font-size: 9px;
    color: var(--ink-faint);
    flex-shrink: 0;
    transition: transform .12s;
  }
  .msel.open .msel-btn .msel-caret{ transform: rotate(180deg); color: var(--gold); }
  .msel-panel{
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    z-index: 50;
    min-width: 180px;
    max-width: 260px;
    background: var(--paper);
    border: 1px solid var(--gold-dim);
    border-radius: 4px;
    box-shadow: 0 14px 36px rgba(43,36,23,0.16);
    padding: 6px;
    display: none;
  }
  .msel.open .msel-panel{ display: block; }
  .msel-panel-actions{
    display:flex;
    justify-content: space-between;
    gap: 6px;
    padding: 4px 6px 8px;
    border-bottom: 1px solid var(--line-soft);
    margin-bottom: 4px;
  }
  .msel-panel-actions button{
    background: none;
    border: none;
    color: var(--gold-deep);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.03em;
    cursor: pointer;
    padding: 2px 4px;
  }
  .msel-panel-actions button:hover{ text-decoration: underline; }
  .msel-options{
    max-height: 230px;
    overflow-y: auto;
  }
  .msel-option{
    display:flex;
    align-items:center;
    gap: 8px;
    padding: 6px 6px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 12.5px;
    color: var(--ink);
  }
  .msel-option:hover{ background: rgba(156,122,46,0.08); }
  .msel-option input[type="checkbox"]{ width: 13px; height:13px; flex-shrink:0; accent-color: var(--gold-deep); }
  .msel-option .msel-opt-label{ flex: 1; }
  .msel-option .msel-opt-count{ color: var(--ink-faint); font-family: var(--mono); font-size: 10.5px; }
  .msel-empty{ padding: 10px 8px; color: var(--ink-faint); font-size: 12px; font-style: italic; }
  @media (max-width: 600px){
    .msel-btn{ width: 100%; }
    .msel-panel{ left: 0; right: 0; max-width: none; width: 100%; }
  }

  .reset-btn{
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-dim);
    padding: 9px 14px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.04em;
    border-radius: 3px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
    height: 38px;
  }
  .reset-btn:hover{ border-color: var(--gold); color: var(--gold-deep); }

  .selection-bar{
    display:flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    background: var(--paper);
    border: 1px solid var(--gold-dim);
    border-radius: 4px;
    padding: 12px 18px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .selection-bar.hidden{ display: none; }
  .selection-info{ font-size: 13px; color: var(--ink); }
  .selection-info b{ color: var(--ink); }
  .selection-info .sv{ color: var(--gold-deep); font-weight: 600; }
  .selection-actions{ display:flex; gap: 10px; }
  .btn-download, .btn-clear-sel{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.04em;
    padding: 8px 14px;
    border-radius: 3px;
    cursor: pointer;
    border: 1px solid var(--gold);
    background: var(--gold);
    color: var(--paper);
    font-weight: 600;
    transition: opacity .12s;
  }
  .btn-download:hover{ opacity: 0.85; }
  .btn-clear-sel{
    background: transparent;
    color: var(--ink-dim);
    border-color: var(--line);
    font-weight: 400;
  }
  .btn-clear-sel:hover{ color: var(--gold-deep); border-color: var(--gold); }

  .result-line{
    display:flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line-soft);
    font-size: 12px;
    color: var(--ink-faint);
    flex-wrap: wrap;
    gap: 8px;
  }
  .result-line b{ color: var(--ink); font-weight: 600; }
  .sort-row{ display:flex; gap:6px; font-family: var(--mono); font-size: 11px; }
  .sort-row button{
    background: none; border:none; color: var(--ink-faint);
    cursor:pointer; padding: 2px 6px; border-radius: 2px;
  }
  .sort-row button.active{ color: var(--gold-deep); background: rgba(156,122,46,0.10); }

  /* ---------- TABLE ---------- */
  .table-wrap{
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
  }
  table{ width: 100%; border-collapse: collapse; }
  thead th{
    background: var(--bg-raised-2);
    text-align: left;
    padding: 9px 6px;
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink-faint);
    border-bottom: 1px solid var(--gold-dim);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover{ color: var(--gold-deep); }
  thead th.num{ text-align: right; }
  thead th.chk{ width: 26px; cursor: default; padding-right: 2px; padding-left: 8px; }
  thead th.chk:hover{ color: var(--ink-faint); }
  thead th .arrow{ opacity: 0.6; margin-left: 2px; font-size: 8px; }
  tbody tr{
    border-bottom: 1px solid var(--line-soft);
    transition: background .1s;
  }
  tbody tr:hover{ background: var(--bg-raised-2); }
  tbody tr.row-selected{ background: rgba(156,122,46,0.08); }
  tbody tr:last-child{ border-bottom: none; }
  tbody td{
    padding: 7px 6px;
    white-space: nowrap;
    font-size: 12.5px;
    color: var(--ink);
  }
  tbody td.chk{ padding: 7px 2px 7px 8px; }
  tbody td.num{ text-align: right; font-variant-numeric: tabular-nums; color: var(--ink-dim); }
  tbody td.amt{ color: var(--gold-deep); font-weight: 600; }
  td.cert{ font-family: var(--mono); font-size: 11px; }
  .cert-link{
    color: var(--ink-faint);
    text-decoration: none;
    border-bottom: 1px dotted var(--ink-faint);
    transition: color .12s, border-color .12s;
  }
  .cert-link:hover{ color: var(--gold-deep); border-color: var(--gold); }
  .media-link{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width: 16px; height: 16px;
    border-radius: 3px;
    color: var(--ink-faint);
    text-decoration: none;
    transition: color .12s, background .12s;
  }
  .media-link:hover{ color: var(--gold-deep); background: rgba(156,122,46,0.10); }
  .media-link svg{ width: 11px; height: 11px; }
  .media-dash{ color: var(--ink-faint); padding-left: 2px; }
  input[type="checkbox"]{
    width: 14px; height: 14px;
    accent-color: var(--gold-deep);
    cursor: pointer;
  }
  .lab-tag{
    font-family: var(--mono);
    font-size: 9px;
    padding: 1px 4px;
    border-radius: 2px;
    border: 1px solid var(--line);
    color: var(--ink-dim);
  }
  .lab-tag.gia{ border-color: var(--gold-dim); color: var(--gold-deep); }
  .status-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width: 20px; height: 20px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    border: 1px solid var(--line);
    color: var(--ink-dim);
    cursor: default;
  }
  .status-badge.status-a{ border-color: var(--good); color: var(--good); }
  .status-badge.status-r{ border-color: var(--oxblood-dim); color: var(--oxblood); }
  .empty-row td{
    padding: 60px 20px;
    text-align: center;
    color: var(--ink-faint);
    font-family: var(--mono);
    font-size: 12px;
  }

  .scroll-x{ overflow-x: auto; }

  footer{
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--line-soft);
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-faint);
    display:flex;
    justify-content: space-between;

<script>
const STORAGE_KEY = 'diamond_ledger_override_v1';
let DATA = ORIGINAL_DATA;

const COLOR_ORDER = ['D','D+','D++','E','E+','E++','F','F+','F++','G','G+','G++','H','H+','H++','I','J','J++','J+++','K'];
const CLARITY_ORDER = ['FL','IF','VVS1','VVS2','VS1','VS1+','VS2','VS2+','VS2++','VS2+++','VS','SI1','SI1++','SI2','SI2+','SI2+++','SI3','I1','I2','I3'];
const CUT_ORDER = ['EX','VG','GD','FR','PR'];
const SHEET_LABELS = {
  '+1,50': '1.50ct & up',
  '1-1,49': '1.00 – 1.49ct',
  '-1,00': 'Under 1.00ct',
  '-0,39': 'Under 0.39ct',
  'SI1-2': 'SI clarity page',
  'FANCY': 'Fancy shapes'
};
const SHEET_ORDER = ['+1,50','1-1,49','-1,00','-0,39','SI1-2','FANCY'];

const COLUMNS = [
  {key:'_chk', label:'', type:'chk'},
  {key:'Certificate', label:'Certificate', type:'cert'},
  {key:'StockNo', label:'Stock #', type:'mono'},
  {key:'Status', label:'Status', type:'status'},
  {key:'Shape', label:'Shape', type:'text'},
  {key:'Lab', label:'Lab', type:'lab'},
  {key:'Size', label:'Cts', type:'num', dec:2},
  {key:'Color', label:'Color', type:'grade'},
  {key:'Clarity', label:'Clarity', type:'grade'},
  {key:'Cut', label:'Cut', type:'text'},
  {key:'Pol', label:'Pol', type:'text'},
  {key:'Sym', label:'Sym', type:'text'},
  {key:'FL', label:'Fluor', type:'text'},
  {key:'Rap', label:'Rap/ct', type:'num', dec:0},
  {key:'RapValue', label:'Rap Value', type:'amt', dec:0},
];

// _id is (re)assigned in rebuildFromData(), since DATA can be replaced via upload/reset

let sortKey = 'RapValue';
let sortDir = -1;
const selected = new Set();
let activeSheet = null; // null = "All ledger pages"

function fmtUSD(v, dec){
  if(v === null || v === undefined) return '—';
  return '$' + v.toLocaleString('en-US', {minimumFractionDigits: dec===undefined?0:dec, maximumFractionDigits: dec===undefined?0:dec});
}
function fmtNum(v, dec){
  if(v === null || v === undefined) return '—';
  return v.toLocaleString('en-US', {minimumFractionDigits: dec||0, maximumFractionDigits: dec||0});
}

function uniqueSorted(arr, order){
  const set = [...new Set(arr)];
  if(order){
    return set.sort((a,b)=> order.indexOf(a) - order.indexOf(b));
  }
  return set.sort();
}

// ---- multi-select dropdown widget ----
const MSELS = {};

function createMultiSelect(id, onChange){
  const el = document.getElementById(id);
  el.classList.add('msel');
  el.innerHTML = `
    <button type="button" class="msel-btn">
      <span class="msel-label">${el.dataset.placeholder || 'All'}</span>
      <span class="msel-caret">▾</span>
    </button>
    <div class="msel-panel">
      <div class="msel-panel-actions">
        <button type="button" class="msel-all">SELECT ALL</button>
        <button type="button" class="msel-none">CLEAR</button>
      </div>
      <div class="msel-options"></div>
    </div>
  `;
  const state = { el, selected: new Set(), options: [], onChange: onChange || function(){} };
  MSELS[id] = state;

  const btn = el.querySelector('.msel-btn');
  btn.addEventListener('click', (e)=>{
    e.stopPropagation();
    const wasOpen = el.classList.contains('open');
    document.querySelectorAll('.msel.open').forEach(o=>{ if(o!==el) o.classList.remove('open'); });
    el.classList.toggle('open', !wasOpen);
  });
  el.querySelector('.msel-all').addEventListener('click', (e)=>{
    e.stopPropagation();
    state.options.forEach(o=> state.selected.add(String(o.value)));
    renderMultiSelect(id);
    state.onChange();
  });
  el.querySelector('.msel-none').addEventListener('click', (e)=>{
    e.stopPropagation();
    state.selected.clear();
    renderMultiSelect(id);
    state.onChange();
  });
  el.addEventListener('click', (e)=> e.stopPropagation());

  return state;
}

function setMultiSelectOptions(id, options){
  const state = MSELS[id];
  const validValues = new Set(options.map(o=>String(o.value)));
  [...state.selected].forEach(v=>{ if(!validValues.has(v)) state.selected.delete(v); });
  state.options = options;
  renderMultiSelect(id);
}

function renderMultiSelect(id){
  const state = MSELS[id];
  const el = state.el;
  const optWrap = el.querySelector('.msel-options');

  if(state.options.length === 0){
    optWrap.innerHTML = '<div class="msel-empty">No options</div>';
  } else {
    optWrap.innerHTML = state.options.map(o=>{
      const val = String(o.value);
      const checked = state.selected.has(val) ? 'checked' : '';
      const countHtml = (o.count !== undefined && o.count !== null) ? `<span class="msel-opt-count">${o.count}</span>` : '';
      return `<label class="msel-option"><input type="checkbox" data-value="${val}" ${checked}><span class="msel-opt-label">${o.label}</span>${countHtml}</label>`;
    }).join('');
    optWrap.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
      cb.addEventListener('change', ()=>{
        const v = cb.dataset.value;
        if(cb.checked) state.selected.add(v); else state.selected.delete(v);
        renderMultiSelectLabel(id);
        state.onChange();
      });
    });
  }
  renderMultiSelectLabel(id);
}

function renderMultiSelectLabel(id){
  const state = MSELS[id];
  const el = state.el;
  const labelEl = el.querySelector('.msel-label');
  const btn = el.querySelector('.msel-btn');
  const n = state.selected.size;

  let existingBadge = btn.querySelector('.msel-count');
  if(n === 0){
    labelEl.textContent = el.dataset.placeholder || 'All';
    labelEl.classList.remove('has-value');
    if(existingBadge) existingBadge.remove();
  } else if(n === 1){
    const onlyVal = [...state.selected][0];
    const opt = state.options.find(o=> String(o.value) === onlyVal);
    labelEl.textContent = opt ? opt.label.replace(/\s*\(\d+\)\s*$/, '') : onlyVal;
    labelEl.classList.add('has-value');
    if(existingBadge) existingBadge.remove();
  } else {
    labelEl.textContent = `${n} selected`;
    labelEl.classList.add('has-value');
  }
}

function getMultiSelectValues(id){
  return MSELS[id] ? new Set(MSELS[id].selected) : new Set();
}

function clearMultiSelect(id){
  const state = MSELS[id];
  if(!state) return;
  state.selected.clear();
  renderMultiSelect(id);
}

document.addEventListener('click', ()=>{
  document.querySelectorAll('.msel.open').forEach(o=> o.classList.remove('open'));
});

function statusBadge(v){
  const code = (v || '').toString().trim().toUpperCase();
  const map = {
    'A': {label:'A', cls:'status-a', title:'Available'},
    'R': {label:'R', cls:'status-r', title:'Reserved / on hold'},
  };
  const m = map[code];
  if(!m) return code ? `<span class="status-badge">${code}</span>` : '<span class="media-dash">—</span>';
  return `<span class="status-badge ${m.cls}" title="${m.title}">${m.label}</span>`;
}

function certLink(cert, lab){
  if(!cert) return null;
  const c = String(cert);
  if(lab === 'GIA'){
    return `https://www.gia.edu/report-check?reportno=${c}`;
  }
  if(lab === 'HRD'){
    return `https://my.hrdantwerp.com/en/verify-a-certificate?number=${c}`;
  }
  return null;
}

// ---- carat buckets ----
function bucketOf(size){
  const lo = Math.floor(size*10)/10;
  return lo;
}
function bucketLabel(lo){
  return `${lo.toFixed(2)}–${(lo+0.09).toFixed(2)} ct`;
}
function bucketLabelPlain(lo){
  return `${lo.toFixed(2)}-${(lo+0.09).toFixed(2)}`;
}
function sheetPool(){
  return activeSheet === null ? DATA : DATA.filter(d=> d.Sheet === activeSheet);
}
function populateCaratRange(){
  const pool = sheetPool();
  const buckets = [...new Set(pool.map(d=>bucketOf(d.Size)))].sort((a,b)=>a-b);
  const options = buckets.map(b=>{
    const count = pool.filter(d=>bucketOf(d.Size)===b).length;
    return { value: b, label: `${bucketLabel(b)} (${count})` };
  });
  setMultiSelectOptions('f-caratrange', options);
}
function refreshExactSizeOptions(){
  const activeBuckets = getMultiSelectValues('f-caratrange');
  let pool = sheetPool();
  if(activeBuckets.size > 0){
    pool = pool.filter(d => activeBuckets.has(String(bucketOf(d.Size))));
  }
  const sizes = uniqueSorted(pool.map(d=>d.Size.toFixed(2)));
  setMultiSelectOptions('f-exactsize', sizes.map(s=>({ value:s, label: s + ' ct' })));
}

function renderLedgerTabs(){
  const wrap = document.getElementById('ledgerTabs');
  const sheetsPresent = SHEET_ORDER.filter(s => DATA.some(d=> d.Sheet === s));
  const counts = {};
  DATA.forEach(d=> counts[d.Sheet] = (counts[d.Sheet]||0)+1);

  let html = `<div class="ledger-tab${activeSheet===null?' active':''}" data-sheet="">All pages<span class="tab-count">${DATA.length}</span></div>`;
  html += sheetsPresent.map(s=>{
    const label = SHEET_LABELS[s] || s;
    return `<div class="ledger-tab${activeSheet===s?' active':''}" data-sheet="${s}">${label}<span class="tab-count">${counts[s]||0}</span></div>`;
  }).join('');
  wrap.innerHTML = html;

  wrap.querySelectorAll('.ledger-tab').forEach(tab=>{
    tab.addEventListener('click', ()=>{
      const s = tab.dataset.sheet;
      activeSheet = s === '' ? null : s;
      renderLedgerTabs();
      populateCaratRange();
      refreshExactSizeOptions();
      render();
    });
  });
}

function rebuildFromData(){
  DATA.forEach((d,i)=> d._id = i);

  const shapes = uniqueSorted(DATA.map(d=>d.Shape));
  const labs = uniqueSorted(DATA.map(d=>d.Lab));
  const shapeLabel = shapes.map(s => s.charAt(0) + s.slice(1).toLowerCase() + 's').join(', ');
  document.getElementById('footerSummary').textContent = `${DATA.length} stones · ${shapeLabel} · ${labs.join(' & ')} certified`;

  setMultiSelectOptions('f-shape', shapes.map(v=>({value:v, label:v})));
  setMultiSelectOptions('f-lab', labs.map(v=>({value:v, label:v})));
  setMultiSelectOptions('f-color', uniqueSorted(DATA.map(d=>d.Color), COLOR_ORDER).map(v=>({value:v, label:v})));
  setMultiSelectOptions('f-clarity', uniqueSorted(DATA.map(d=>d.Clarity), CLARITY_ORDER).map(v=>({value:v, label:v})));
  setMultiSelectOptions('f-cut', uniqueSorted(DATA.map(d=>d.Cut).filter(Boolean), CUT_ORDER).map(v=>({value:v, label:v})));

  activeSheet = null;
  renderLedgerTabs();
  populateCaratRange();
  refreshExactSizeOptions();

  selected.clear();
  Object.keys(MSELS).forEach(id=> clearMultiSelect(id));
  document.querySelectorAll('.field input').forEach(i=>i.value='');

  render();
}

function init(){
  document.getElementById('genTime').textContent = 'Rendered client-side · no data leaves this page';

  loadStoredDataIfAny();

  ['f-status','f-shape','f-lab','f-color','f-clarity','f-cut'].forEach(id=>{
    createMultiSelect(id, render);
  });
  createMultiSelect('f-caratrange', ()=>{ refreshExactSizeOptions(); render(); });
  createMultiSelect('f-exactsize', render);

  setMultiSelectOptions('f-status', [
    { value:'A', label:'Available' },
    { value:'R', label:'Reserved / on hold' },
  ]);

  buildHead();
  rebuildFromData();

  document.getElementById('f-search').addEventListener('input', render);

  document.getElementById('resetBtn').addEventListener('click', ()=>{
    Object.keys(MSELS).forEach(id=> clearMultiSelect(id));
    document.querySelectorAll('.field input').forEach(i=>i.value='');
    activeSheet = null;
    renderLedgerTabs();
    populateCaratRange();
    refreshExactSizeOptions();
    render();
  });
  document.getElementById('clearSelBtn').addEventListener('click', ()=>{
    selected.clear();
    render();
  });
  document.getElementById('downloadBtn').addEventListener('click', downloadSelection);

  document.getElementById('uploadBtn').addEventListener('click', openPasswordGate);
  document.getElementById('pwCancelBtn').addEventListener('click', closePasswordGate);
  document.getElementById('pwSubmitBtn').addEventListener('click', submitPasswordGate);
  document.getElementById('pwInput').addEventListener('keydown', (e)=>{ if(e.key === 'Enter') submitPasswordGate(); });
  document.getElementById('fileInput').addEventListener('change', handleFileUpload);
  document.getElementById('resetDataBtn').addEventListener('click', resetToOriginalData);
  document.getElementById('previewCancelBtn').addEventListener('click', cancelPreview);
  document.getElementById('previewConfirmBtn').addEventListener('click', confirmPreview);
}

function buildHead(){
  const tr = document.getElementById('headRow');
  COLUMNS.forEach(col=>{
    const th = document.createElement('th');
    if(col.type==='num' || col.type==='amt') th.classList.add('num');
    if(col.type==='chk'){
      th.classList.add('chk');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.id = 'selectAllChk';
      cb.title = 'Select all shown';
      cb.addEventListener('change', ()=>{
        const filtered = getFiltered();
        if(cb.checked){ filtered.forEach(d=>selected.add(d._id)); }
        else { filtered.forEach(d=>selected.delete(d._id)); }
        render();
      });
      th.appendChild(cb);
      tr.appendChild(th);
      return;
    }
    th.dataset.key = col.key;
    th.innerHTML = col.label + '<span class="arrow"></span>';
    th.addEventListener('click', ()=>{
      if(sortKey === col.key){ sortDir *= -1; } else { sortKey = col.key; sortDir = 1; }
      render();
    });
    tr.appendChild(th);
  });
}

function getFiltered(){
  const status = getMultiSelectValues('f-status');
  const shape = getMultiSelectValues('f-shape');
  const lab = getMultiSelectValues('f-lab');
  const color = getMultiSelectValues('f-color');
  const clarity = getMultiSelectValues('f-clarity');
  const cut = getMultiSelectValues('f-cut');
  const caratrange = getMultiSelectValues('f-caratrange');
  const exactsize = getMultiSelectValues('f-exactsize');
  const search = document.getElementById('f-search').value.trim().toLowerCase();

  return DATA.filter(d=>{
    if(activeSheet !== null && d.Sheet !== activeSheet) return false;
    if(status.size && !status.has((d.Status||'').toString().trim().toUpperCase())) return false;
    if(shape.size && !shape.has(d.Shape)) return false;
    if(lab.size && !lab.has(d.Lab)) return false;
    if(color.size && !color.has(d.Color)) return false;
    if(clarity.size && !clarity.has(d.Clarity)) return false;
    if(cut.size && !cut.has(d.Cut)) return false;
    if(caratrange.size && !caratrange.has(String(bucketOf(d.Size)))) return false;
    if(exactsize.size && !exactsize.has(d.Size.toFixed(2))) return false;
    if(search){
      const certMatch = d.Certificate && String(d.Certificate).toLowerCase().includes(search);
      const stockMatch = d.StockNo && String(d.StockNo).toLowerCase().includes(search);
      if(!certMatch && !stockMatch) return false;
    }
    return true;
  });
}

function colLetter(n){
  let s = '';
  while(n > 0){
    const rem = (n - 1) % 26;
    s = String.fromCharCode(65 + rem) + s;
    n = Math.floor((n - 1) / 26);
  }
  return s;
}

// ---- upload / persistence ----
const UPLOAD_PASSWORD = 'willWin';
const REQUIRED_HEADERS = ['Certificate','Status','Shape','Lab','Size'];
const PREVIEW_COLS = ['Certificate','StockNo','Status','Shape','Lab','Size','Color','Clarity','Rap','RapValue'];
let pendingUpload = null;

function setUploadStatus(msg, cls){

}

function handleFileUpload(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  setUploadStatus('Reading ' + file.name + '…', 'busy');

  const reader = new FileReader();
  reader.onerror = () => setUploadStatus('Could not read that file. Try again.', 'err');
  reader.onload = (e) => {
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const sheetName = wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:null});

      if(!rows || rows.length < 2){
        setUploadStatus('That file looks empty.', 'err');
        return;
      }

      const header = rows[0].map(h => (h===null||h===undefined) ? '' : String(h).trim());
      const missing = REQUIRED_HEADERS.filter(h => !header.includes(h));
      if(missing.length){
        setUploadStatus(`Missing column(s): ${missing.join(', ')}. Expected a flat sheet with these column headers (see "RESET TO ORIGINAL" for an example layout).`, 'err');
        return;
      }

      const idxOf = {};
      header.forEach((h,i)=>{ if(h) idxOf[h] = i; });

      const parsed = [];
      for(let r=1; r<rows.length; r++){
        const row = rows[r];
        if(!row || row.every(c => c===null || c===undefined || c==='')) continue;
        const rec = {};
        header.forEach(h=>{
          if(!h) return;
          let v = row[idxOf[h]];
          if(v === undefined) v = null;
          if(typeof v === 'number') v = Math.round(v*100)/100;
          if(typeof v === 'string'){
            const t = v.trim();
            v = t === '' ? null : t;
          }
          rec[h] = v;
        });
        if(rec.Certificate === null || rec.Certificate === undefined) continue;
        if(rec.Rap && rec.Size && (rec.RapValue===null || rec.RapValue===undefined)){
          rec.RapValue = Math.round(rec.Rap * rec.Size * 100)/100;
        }
        if(!rec.Sheet) rec.Sheet = 'Uploaded';
        parsed.push(rec);
      }

      if(parsed.length === 0){
        setUploadStatus('No usable rows found in that file.', 'err');
        return;
      }

      pendingUpload = { parsed, filename: file.name };
      openPreview(pendingUpload);
    }catch(err){
      setUploadStatus('Could not read that file. Make sure it\'s a valid .xlsx.', 'err');
    }finally{
      ev.target.value = '';
    }
  };
  reader.readAsArrayBuffer(file);
}

function buildPreviewWarnings(parsed){
  const warnings = [];
  const currentCount = DATA.length;
  const newCount = parsed.length;
  const pctChange = currentCount ? Math.abs(newCount - currentCount) / currentCount : 0;

  if(currentCount && pctChange >= 0.5){
    warnings.push({
      severe: true,
      text: `Stone count changes from ${currentCount} to ${newCount} — that's a ${Math.round(pctChange*100)}% difference. Double-check this is the right file.`
    });
  }

  const validStatuses = ['A','R'];
  const badStatusCount = parsed.filter(d => d.Status && !validStatuses.includes(String(d.Status).trim().toUpperCase())).length;
  if(badStatusCount > 0){
    warnings.push({ severe:false, text: `${badStatusCount} row(s) have a Status value other than A or R.` });
  }

  const noCertCount = parsed.filter(d => !d.Certificate).length;
  if(noCertCount > 0){
    warnings.push({ severe:false, text: `${noCertCount} row(s) were skipped for missing a Certificate number.` });
  }

  const dupCerts = {};
  parsed.forEach(d=>{ const c = String(d.Certificate); dupCerts[c] = (dupCerts[c]||0)+1; });
  const dupCount = Object.values(dupCerts).filter(c=>c>1).length;
  if(dupCount > 0){
    warnings.push({ severe:false, text: `${dupCount} certificate number(s) appear more than once in this file.` });
  }

  return warnings;
}

function openPreview({parsed, filename}){
  const totalValue = parsed.reduce((s,d)=> s + (d.RapValue||0), 0);
  const totalCarats = parsed.reduce((s,d)=> s + (d.Size||0), 0);

  document.getElementById('previewSummary').innerHTML = `
    File: <b>${filename}</b><br>
    <b>${parsed.length}</b> stones · <b>${totalCarats.toFixed(2)} ct</b> total weight · <b>$${Math.round(totalValue).toLocaleString()}</b> Rap value<br>
    Current dashboard has <b>${DATA.length}</b> stones — this will replace all of it if you continue.
  `;

  const warnings = buildPreviewWarnings(parsed);
  const warnBox = document.getElementById('previewWarnings');
  warnBox.innerHTML = warnings.map(w =>
    `<div class="preview-warning-item${w.severe?' severe':''}">${w.severe?'⚠ ':''}${w.text}</div>`
  ).join('');

  const headRow = document.getElementById('previewHeadRow');
  headRow.innerHTML = PREVIEW_COLS.map(c=>`<th>${c}</th>`).join('');

  const body = document.getElementById('previewBodyRows');
  const sample = parsed.slice(0, 15);
  body.innerHTML = sample.map(d=>
    '<tr>' + PREVIEW_COLS.map(c=>{
      const v = d[c];
      return `<td>${v===null||v===undefined?'—':v}</td>`;
    }).join('') + '</tr>'
  ).join('') + (parsed.length > 15 ? `<tr class="preview-more-row"><td colspan="${PREVIEW_COLS.length}">…and ${parsed.length-15} more rows</td></tr>` : '');

  document.getElementById('previewOverlay').classList.remove('hidden');
}

function cancelPreview(){
  pendingUpload = null;
  document.getElementById('previewOverlay').classList.add('hidden');
  setUploadStatus('Upload cancelled. Dashboard unchanged.', '');
}

function confirmPreview(){
  if(!pendingUpload) return;
  const { parsed, filename } = pendingUpload;

  DATA = parsed;
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      filename,
      uploadedAt: new Date().toISOString(),
      data: parsed
    }));
  }catch(storageErr){
    // storage full or unavailable; still apply data for this session
  }

  document.getElementById('sourceFileName').textContent = filename;
  document.getElementById('resetDataBtn').classList.remove('hidden');
  setUploadStatus(`Updated · ${parsed.length} stones loaded from ${filename}`, 'ok');
  document.getElementById('previewOverlay').classList.add('hidden');
  pendingUpload = null;
  rebuildFromData();
}

function loadStoredDataIfAny(){
  let raw;
  try{ raw = localStorage.getItem(STORAGE_KEY); }catch(e){ raw = null; }
  if(!raw) return;
  try{
    const stored = JSON.parse(raw);
    if(stored && Array.isArray(stored.data) && stored.data.length){
      DATA = stored.data;
      document.getElementById('sourceFileName').textContent = stored.filename || 'Updated file';
      document.getElementById('resetDataBtn').classList.remove('hidden');
      const when = stored.uploadedAt ? new Date(stored.uploadedAt) : null;
      setUploadStatus(when ? `Showing your upload from ${when.toLocaleDateString()} ${when.toLocaleTimeString()}` : 'Showing your last uploaded data', 'ok');
    }
  }catch(e){
    // corrupted storage; ignore and fall back to original
  }
}

function downloadSelection(){
  const rows = DATA.filter(d=>selected.has(d._id));
  if(rows.length === 0) return;

  const headers = ['Certificate','Stock No','Status','Shape','Lab','Size','Color','Clarity','Cut','Pol','Sym','FL','Rap','Rap Value','Length','Width','Height','Ledger Page'];
  const idx = {};
  headers.forEach((h,i)=> idx[h] = i+1);

  const headerSheetRow = 2;
  const firstDataRow = 3;
  const lastDataRow = firstDataRow + rows.length - 1;

  const aoa = [];
  aoa.push(new Array(headers.length).fill(''));
  aoa.push(headers);

  rows.forEach(d=>{
    const row = headers.map(h=>{
      if(h === 'Stock No') return d.StockNo || '';
      if(h === 'Rap Value') return d.RapValue;
      if(h === 'Ledger Page') return SHEET_LABELS[d.Sheet] || d.Sheet || '';
      const v = d[h];
      return v === null || v === undefined ? '' : v;
    });
    aoa.push(row);
  });

  const ws = XLSX.utils.aoa_to_sheet(aoa);

  function colRange(label){
    const L = colLetter(idx[label]);
    return `${L}${firstDataRow}:${L}${lastDataRow}`;
  }
  function setFormula(label, formula){
    const addr = `${colLetter(idx[label])}1`;
    ws[addr] = {t:'n', f: formula};
  }

  setFormula('Shape', `SUBTOTAL(3,${colRange('Shape')})`);
  setFormula('Size', `SUBTOTAL(9,${colRange('Size')})`);
  setFormula('Rap Value', `SUBTOTAL(9,${colRange('Rap Value')})`);
  setFormula('Rap', `SUBTOTAL(9,${colRange('Rap Value')})/${colLetter(idx['Size'])}1`);

  const widthMap = {
    'Certificate':13.1,'Stock No':10.4,'Status':6,'Shape':9,'Lab':4.7,'Size':4.6,'Color':6.4,
    'Clarity':7.5,'Cut':4,'Pol':3.9,'Sym':4.7,'FL':5.3,'Rap':7.9,
    'Rap Value':10.9,'Length':7,'Width':6.4,'Height':6.9,'Ledger Page':12.4
  };
  ws['!cols'] = headers.map(h=>({wch: widthMap[h] || 9}));

  const numFmt = {
    'Size':'0.00','Rap':'0','Rap Value':'0','Length':'0.00','Width':'0.00','Height':'0.00'
  };
  for(let r = firstDataRow; r <= lastDataRow; r++){
    headers.forEach(h=>{
      if(numFmt[h]){
        const addr = `${colLetter(idx[h])}${r}`;
        if(ws[addr]) ws[addr].z = numFmt[h];
      }
    });
  }

  for(let r = firstDataRow; r <= lastDataRow; r++){
    headers.forEach((h,i)=>{
      const addr = `${colLetter(i+1)}${r}`;
      const c = ws[addr];
      if(c && !c.s){
        c.s = {font:{name:'Calibri', sz:11}};
      }
    });
  }

  const summaryFmt = {'Size':'0.00','Rap':'0','Rap Value':'0'};
  ['Shape','Size','Rap','Rap Value'].forEach(h=>{
    const addr = `${colLetter(idx[h])}1`;
    if(ws[addr]){
      ws[addr].s = {font:{name:'Calibri', sz:11, bold:true, color:{rgb:'FF7A2E2E'}}, alignment:{horizontal:'center', vertical:'center'}};
      if(summaryFmt[h]) ws[addr].z = summaryFmt[h];
    }
  });

  headers.forEach((h,i)=>{
    const addr = `${colLetter(i+1)}${headerSheetRow}`;
    if(ws[addr]) ws[addr].s = {
      font:{name:'Calibri', sz:11, bold:true, color:{rgb:'FFFFFFFF'}},
      fill:{patternType:'solid', fgColor:{rgb:'FF9C7A2E'}},
      alignment:{horizontal:'center', vertical:'center'}
    };
  });

  ws['!ref'] = XLSX.utils.encode_range({s:{r:0,c:0}, e:{r:lastDataRow-1, c:headers.length-1}});

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');

  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const datePart = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const timePart = `${pad(now.getHours())}-${pad(now.getMinutes())}-${pad(now.getSeconds())}`;
  XLSX.writeFile(wb, `Selection_${datePart}_${timePart}.xlsx`);
}

function render(){
  const filtered = getFiltered();

  filtered.sort((a,b)=>{
    let av = a[sortKey], bv = b[sortKey];
    if(av === null || av === undefined) av = -Infinity;
    if(bv === null || bv === undefined) bv = -Infinity;
    if(typeof av === 'string') return av.localeCompare(bv) * sortDir;
    return (av - bv) * sortDir;
  });

  document.querySelectorAll('#headRow th').forEach(th=>{
    const arrow = th.querySelector('.arrow');
    if(arrow) arrow.textContent = th.dataset.key === sortKey ? (sortDir===1 ? '▲' : '▼') : '';
  });

  const totalValue = filtered.reduce((s,d)=> s + (d.RapValue||0), 0);
  document.getElementById('resultCount').textContent = filtered.length;
  document.getElementById('resultValue').textContent = fmtUSD(totalValue, 0);

  const tbody = document.getElementById('bodyRows');
  tbody.innerHTML = '';

  if(filtered.length === 0){
    tbody.innerHTML = `<tr class="empty-row"><td colspan="${COLUMNS.length}">No stones match these filters. Try widening the carat range or clearing a grade filter.</td></tr>`;
  } else {
    filtered.forEach(d=>{
      const tr = document.createElement('tr');
      if(selected.has(d._id)) tr.classList.add('row-selected');
      tr.innerHTML = COLUMNS.map(col=>{
        const v = d[col.key];
        if(col.type==='chk'){
          return `<td class="chk"><input type="checkbox" data-id="${d._id}" ${selected.has(d._id)?'checked':''}></td>`;
        }
        if(col.type==='cert'){
          const href = certLink(v, d.Lab);
          if(href) return `<td class="cert"><a class="cert-link" href="${href}" target="_blank" rel="noopener">${v}</a></td>`;
          return `<td class="cert">${v===null||v===undefined?'—':v}</td>`;
        }
        if(col.type==='mono') return `<td class="cert">${v===null||v===undefined?'—':v}</td>`;
        if(col.type==='lab') return `<td><span class="lab-tag ${v==='GIA'?'gia':''}">${v}</span></td>`;
        if(col.type==='status') return `<td>${statusBadge(v)}</td>`;
        if(col.type==='grade') return `<td>${v===null||v===undefined?'—':v}</td>`;
        if(col.type==='num') return `<td class="num">${fmtNum(v, col.dec)}</td>`;
        if(col.type==='amt') return `<td class="num amt">${fmtUSD(v, 0)}</td>`;
        return `<td>${v===null||v===undefined?'—':v}</td>`;
      }).join('');
      tbody.appendChild(tr);
    });
  }

  tbody.querySelectorAll('input[type="checkbox"][data-id]').forEach(cb=>{
    cb.addEventListener('change', ()=>{
      const id = parseInt(cb.dataset.id);
      if(cb.checked) selected.add(id); else selected.delete(id);
      render();
    });
  });

  const selectAllChk = document.getElementById('selectAllChk');
  if(selectAllChk){
    const allSelected = filtered.length > 0 && filtered.every(d=>selected.has(d._id));
    selectAllChk.checked = allSelected;
  }

  renderSelectionBar();
}

function renderSelectionBar(){
  const bar = document.getElementById('selectionBar');
  const rows = DATA.filter(d=>selected.has(d._id));
  if(rows.length === 0){
    bar.classList.add('hidden');
    return;
  }
  bar.classList.remove('hidden');
  const totalValue = rows.reduce((s,d)=> s + (d.RapValue||0), 0);
  const totalCarats = rows.reduce((s,d)=> s + d.Size, 0);
  document.getElementById('selCount').textContent = rows.length;
  document.getElementById('selValue').textContent = fmtUSD(totalValue, 0);
  document.getElementById('selCarats').textContent = totalCarats.toFixed(2);
}
